<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>App Status</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            background-color: #f9fafb;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
        }
        .card {
            background: white;
            padding: 3rem 2rem;
            border-radius: 1.25rem;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.05), 0 10px 10px -5px rgba(0, 0, 0, 0.02);
            max-width: 440px;
            width: 100%;
            text-align: center;
        }
        .icon-container {
            background-color: #fef2f2;
            width: 80px;
            height: 80px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 2rem;
        }
    </style>
</head>
<body>
    <div class="card">
        <!-- Warning Icon -->
        <div class="mb-8">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-16 w-16 mx-auto text-red-500" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z" />
            </svg>
        </div>

        <!-- Main Message -->
        <h1 class="text-[28px] leading-tight font-extrabold text-slate-900 mb-5 tracking-tight">
            This App not Work <br> Any more
        </h1>

        <!-- Subtext -->
        <p class="text-slate-500 text-lg leading-relaxed mb-10 px-4">
            Pls use your new access to continue using our services.
        </p>

        <!-- Subtle Divider -->
        <div class="w-full h-px bg-slate-100 mb-8"></div>

        <!-- Footer Info -->
        <p class="text-sm text-slate-400 leading-relaxed max-w-[280px] mx-auto">
            If you believe this is an error, please contact support.
        </p>
    </div>
</body>
</html>
